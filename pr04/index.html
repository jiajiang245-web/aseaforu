    <h1>PUERTO RICO</h1>
    <p class="poem">Where are your monuments, your battles, martyrs?
Where is your tribal memory?

Sirs,
in that gray vault. The sea. The sea
has locked them up.</p>
    <p class="citation">Walcott, The Sea Is History</p>
